<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Insight Analyser | Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="minimal-wrapper">
        <header class="minimal-header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Insight<sup>AI</sup></h1>
            </div>
            <div id="statsHeader" class="header-stats hidden">
                <span id="analysisMeta"></span>
            </div>
        </header>

        <main class="feed-container">
            <!-- 1. Top Themes -->
            <section id="themesSection" class="feed-section hidden">
                <h2 class="section-title">Top Product Themes</h2>
                <div id="themesList" class="feed-list">
                    <div class="loading-shimmer"></div>
                </div>
            </section>

            <!-- 2. Voice of the User -->
            <section id="quotesSection" class="feed-section hidden">
                <h2 class="section-title">Voice of the User</h2>
                <div id="quotesList" class="feed-list">
                    <!-- Dynamic Content -->
                </div>
            </section>

            <!-- 3. Product Action Ideas -->
            <section id="actionSection" class="feed-section hidden">
                <h2 class="section-title">Actionable Recommendations</h2>
                <div id="actionList" class="feed-list">
                    <!-- Dynamic Content -->
                </div>
            </section>

            <!-- 4. Dispatch (Footer) -->
            <section class="feed-section dispatch-section">
                <h3 class="section-subtitle">Share Analysis</h3>
                <form id="emailForm" class="minimal-form">
                    <input type="text" id="recipientName" placeholder="Recipient Name" required>
                    <input type="email" id="recipientEmail" placeholder="Stakeholder Email" required>
                    <div class="action-footer">
                        <button type="submit" id="sendEmailBtn" class="btn btn-primary">Dispatch via Gmail</button>
                        <button type="button" id="triggerPipeline" class="btn btn-secondary">Regenerate Analysis</button>
                    </div>
                </form>
                <div id="emailStatus" class="status-msg"></div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
